server {
    listen 80;
    listen [::]:80;
    server_name 37-46-18-40.sslip.io 37.46.18.40.sslip.io vm939255.vds.as210546.net;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name 37-46-18-40.sslip.io 37.46.18.40.sslip.io vm939255.vds.as210546.net;

    ssl_certificate /home/openclaw/.openclaw/workspace/agonarena_bot/ops/ssl/agonarena.crt;
    ssl_certificate_key /home/openclaw/.openclaw/workspace/agonarena_bot/ops/ssl/agonarena.key;

    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 300s;
    }
}
