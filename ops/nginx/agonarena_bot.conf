server {
    listen 80;
    listen [::]:80;
    server_name 37-46-18-40.sslip.io 37.46.18.40.sslip.io vm939255.vds.as210546.net;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name 37-46-18-40.sslip.io 37.46.18.40.sslip.io vm939255.vds.as210546.net;

    # Let's Encrypt certificates (paths updated by setup_ssl.sh)
    # For self-signed certs (development):
    # ssl_certificate /home/openclaw/.openclaw/workspace/agonarena_bot/ops/ssl/agonarena.crt;
    # ssl_certificate_key /home/openclaw/.openclaw/workspace/agonarena_bot/ops/ssl/agonarena.key;
    # For Let's Encrypt (production):
    ssl_certificate /etc/letsencrypt/live/37-46-18-40.sslip.io/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/37-46-18-40.sslip.io/privkey.pem;

    # SSL configuration
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 300s;
    }
}
